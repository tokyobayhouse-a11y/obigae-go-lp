<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="ゴジラずかん">
  <meta name="theme-color" content="#0a0a0a">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <title>ゴジラずかん</title>
  <link rel="stylesheet" href="style.css?v=12">
</head>
<body>
  <!-- ホーム -->
  <div id="screen-home" class="screen active">
    <header class="top-header">
      <h1 class="title">ゴジラずかん</h1>
      <button class="bgm-btn on" id="bgm-btn" aria-label="BGM">🎵</button>
    </header>
    <div class="home-content">
      <div id="daily-godzilla-wrap"></div>
      <button class="menu-tile menu-big" data-target="zukan">
        <span class="menu-emoji">📖</span>
        <span class="menu-name">ずかん</span>
        <span class="menu-sub">51たい</span>
      </button>
      <div class="menu-section-label">🎮 ゲーム</div>
      <div class="menu-grid">
        <button class="menu-tile" data-target="quiz-menu">
          <span class="menu-emoji">❓</span><span class="menu-name">クイズ</span>
        </button>
        <button class="menu-tile" data-target="memory-menu">
          <span class="menu-emoji">🃏</span><span class="menu-name">めくって</span>
        </button>
        <button class="menu-tile" data-target="battle-menu">
          <span class="menu-emoji">⚔️</span><span class="menu-name">バトル</span>
        </button>
        <button class="menu-tile" data-target="puzzle">
          <span class="menu-emoji">🧩</span><span class="menu-name">パズル</span>
        </button>
        <button class="menu-tile menu-new" data-target="roarquiz">
          <span class="menu-emoji">🔊</span><span class="menu-name">なきごえクイズ</span>
        </button>
        <button class="menu-tile menu-new" data-target="whack">
          <span class="menu-emoji">🔨</span><span class="menu-name">かいじゅうたたき</span>
        </button>
      </div>
      <div class="menu-section-label">📚 みる・しる</div>
      <div class="menu-grid">
        <button class="menu-tile" data-target="timeline">
          <span class="menu-emoji">📅</span><span class="menu-name">ねんぴょう</span>
        </button>
        <button class="menu-tile" data-target="family">
          <span class="menu-emoji">👪</span><span class="menu-name">かんけい</span>
        </button>
        <button class="menu-tile" data-target="ranking">
          <span class="menu-emoji">🏆</span><span class="menu-name">ランキング</span>
        </button>
        <button class="menu-tile" data-target="compare">
          <span class="menu-emoji">📏</span><span class="menu-name">サイズくらべ</span>
        </button>
        <button class="menu-tile" data-target="stamps">
          <span class="menu-emoji">⭐</span><span class="menu-name">スタンプ</span>
          <span class="menu-sub" id="stamp-count-label">0たい</span>
        </button>
        <button class="menu-tile" data-target="zukan-kaiju">
          <span class="menu-emoji">👾</span><span class="menu-name">かいじゅう</span>
        </button>
      </div>
    </div>
  </div>

  <!-- クイズメニュー（モード選択） -->
  <div id="screen-quiz-menu" class="screen">
    <header class="sub-header">
      <button class="back-btn" data-back="home">←</button>
      <h2 class="sub-title">クイズ</h2><div class="sub-spacer"></div>
    </header>
    <div class="screen-body">
      <div class="mode-section-label">🎮 モード</div>
      <button class="big-action-btn" data-quiz-mode="single">
        <span class="action-emoji">🧑</span>
        <span>ひとりで あそぶ</span>
      </button>
      <button class="big-action-btn p2" data-quiz-mode="2p">
        <span class="action-emoji">👦👶</span>
        <span>ふたりで たいせん！</span>
      </button>
      <div class="mode-section-label">📊 むずかしさ</div>
      <div class="diff-row" id="diff-row">
        <button class="diff-btn active" data-diff="easy">かんたん<br><small>12たい・4たく</small></button>
        <button class="diff-btn" data-diff="normal">ふつう<br><small>51たい・4たく</small></button>
        <button class="diff-btn" data-diff="hard">むずかしい<br><small>51たい・6たく</small></button>
      </div>
    </div>
  </div>

  <!-- メモリーメニュー -->
  <div id="screen-memory-menu" class="screen">
    <header class="sub-header">
      <button class="back-btn" data-back="home">←</button>
      <h2 class="sub-title">めくってあわせる</h2><div class="sub-spacer"></div>
    </header>
    <div class="screen-body">
      <div class="mode-section-label">🎮 モード</div>
      <button class="big-action-btn" data-mem-mode="single">
        <span class="action-emoji">🧑</span><span>ひとりで あそぶ</span>
      </button>
      <button class="big-action-btn p2" data-mem-mode="2p">
        <span class="action-emoji">👦👶</span><span>ふたりで たいせん！</span>
      </button>
    </div>
  </div>

  <!-- バトルメニュー -->
  <div id="screen-battle-menu" class="screen">
    <header class="sub-header">
      <button class="back-btn" data-back="home">←</button>
      <h2 class="sub-title">かいじゅうバトル</h2><div class="sub-spacer"></div>
    </header>
    <div class="screen-body">
      <div class="mode-section-label">🎮 モード</div>
      <button class="big-action-btn" data-bat-mode="single">
        <span class="action-emoji">🤖</span><span>コンピューターと たたかう</span>
      </button>
      <button class="big-action-btn p2" data-bat-mode="2p">
        <span class="action-emoji">👦👶</span><span>ふたりで たいせん！</span>
      </button>
    </div>
  </div>

  <!-- ずかん -->
  <div id="screen-zukan" class="screen">
    <header class="sub-header">
      <button class="back-btn" data-back="home">←</button>
      <h2 class="sub-title">ずかん</h2><div class="sub-spacer"></div>
    </header>
    <div class="filter-tabs">
      <button class="filter-tab active" data-filter="all">ぜんぶ</button>
      <button class="filter-tab" data-filter="godzilla">ゴジラ</button>
      <button class="filter-tab" data-filter="kaiju">かいじゅう</button>
    </div>
    <div class="gallery" id="gallery"></div>
  </div>

  <!-- 詳細 -->
  <div id="screen-detail" class="screen">
    <header class="detail-header">
      <button class="back-btn" id="btn-back">←</button>
      <div class="detail-counter" id="detail-counter"></div>
    </header>
    <div class="detail-content" id="detail-content"></div>
  </div>

  <!-- 全画面ビューア -->
  <div id="screen-fullimg" class="screen fullimg-screen">
    <img id="fullimg" alt="">
    <button class="fullimg-close" id="btn-fullimg-close">×</button>
  </div>

  <!-- クイズ -->
  <div id="screen-quiz" class="screen">
    <header class="sub-header">
      <button class="back-btn" data-back="quiz-menu">←</button>
      <h2 class="sub-title">クイズ</h2>
      <div class="quiz-score" id="quiz-score">0 / 0</div>
    </header>
    <div class="screen-body" id="quiz-content"></div>
  </div>

  <!-- メモリーゲーム -->
  <div id="screen-memory" class="screen">
    <header class="sub-header">
      <button class="back-btn" data-back="memory-menu">←</button>
      <h2 class="sub-title">めくってあわせる</h2>
      <div class="memory-score" id="memory-score">0 / 8</div>
    </header>
    <div class="screen-body" id="memory-content"></div>
  </div>

  <!-- バトル -->
  <div id="screen-battle" class="screen">
    <header class="sub-header">
      <button class="back-btn" data-back="battle-menu">←</button>
      <h2 class="sub-title">かいじゅうバトル</h2><div class="sub-spacer"></div>
    </header>
    <div class="screen-body" id="battle-content"></div>
  </div>

  <!-- なきごえクイズ -->
  <div id="screen-roarquiz" class="screen">
    <header class="sub-header">
      <button class="back-btn" data-back="home">←</button>
      <h2 class="sub-title">なきごえクイズ</h2>
      <div class="quiz-score" id="roarquiz-score">0 / 0</div>
    </header>
    <div class="screen-body" id="roarquiz-content"></div>
  </div>

  <!-- かいじゅうたたき -->
  <div id="screen-whack" class="screen">
    <header class="sub-header">
      <button class="back-btn" data-back="home">←</button>
      <h2 class="sub-title">かいじゅうたたき</h2><div class="sub-spacer"></div>
    </header>
    <div class="screen-body" id="whack-content"></div>
  </div>

  <!-- パズル -->
  <div id="screen-puzzle" class="screen">
    <header class="sub-header">
      <button class="back-btn" data-back="home">←</button>
      <h2 class="sub-title">ジグソーパズル</h2><div class="sub-spacer"></div>
    </header>
    <div class="screen-body" id="puzzle-content"></div>
  </div>

  <!-- タイムライン -->
  <div id="screen-timeline" class="screen">
    <header class="sub-header">
      <button class="back-btn" data-back="home">←</button>
      <h2 class="sub-title">ねんぴょう</h2><div class="sub-spacer"></div>
    </header>
    <div class="screen-body" id="timeline-content"></div>
  </div>

  <!-- ファミリー -->
  <div id="screen-family" class="screen">
    <header class="sub-header">
      <button class="back-btn" data-back="home">←</button>
      <h2 class="sub-title">かんけい</h2><div class="sub-spacer"></div>
    </header>
    <div class="screen-body" id="family-content"></div>
  </div>

  <!-- ランキング -->
  <div id="screen-ranking" class="screen">
    <header class="sub-header">
      <button class="back-btn" data-back="home">←</button>
      <h2 class="sub-title">ランキング</h2><div class="sub-spacer"></div>
    </header>
    <div class="screen-body" id="ranking-content"></div>
  </div>

  <!-- サイズくらべ -->
  <div id="screen-compare" class="screen">
    <header class="sub-header">
      <button class="back-btn" data-back="home">←</button>
      <h2 class="sub-title">サイズくらべ</h2><div class="sub-spacer"></div>
    </header>
    <div class="screen-body" id="compare-content"></div>
  </div>

  <!-- スタンプ帳 -->
  <div id="screen-stamps" class="screen">
    <header class="sub-header">
      <button class="back-btn" data-back="home">←</button>
      <h2 class="sub-title">スタンプ帳</h2><div class="sub-spacer"></div>
    </header>
    <div class="screen-body" id="stamps-content"></div>
  </div>

  <script src="data.js?v=12"></script>
  <script src="roar.js?v=12"></script>
  <script src="bgm.js?v=12"></script>
  <script src="games.js?v=12"></script>
  <script src="extras.js?v=12"></script>
  <script src="app.js?v=12"></script>
</body>
</html>
